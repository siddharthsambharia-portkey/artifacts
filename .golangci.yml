version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gofmt

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: "_test\\.go"
      linters: [unused, govet]
    - path: "e2e/"
      linters: [unused]
