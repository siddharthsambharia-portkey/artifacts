version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [unused, govet]
      - path: "e2e/"
        linters: [unused]

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
