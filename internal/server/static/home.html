<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifact</title>
  <link rel="stylesheet" href="/ui.css">
  <script src="/artifact.js"></script>
  <style>
    /* Home page chrome — warm accent on a clean white canvas (light only). */
    :root {
      --brand:       #e8722e;
      --brand-hover: #d4631f;
      --brand-ring:  rgba(232, 114, 46, 0.16);
    }

    body { background: var(--color-bg); }

    /* ── Page header ── */
    .page-header { align-items: center; padding-block: var(--space-12) var(--space-6); }
    .page-header__title {
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
      font-size: 3rem;
      line-height: 1.05;
      font-weight: var(--weight-semibold);
      letter-spacing: -0.02em;
      color: var(--color-text);
      display: flex; align-items: center; gap: var(--space-3);
    }
    .site-count {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: var(--weight-medium);
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      padding: 3px var(--space-3);
      letter-spacing: 0;
      white-space: nowrap;
    }
    .site-count:empty { display: none; }

    /* New artifact button keeps the design-system black, with a touch more presence */
    #new-site { padding-block: var(--space-3); border-radius: var(--radius-lg); }

    /* ── Search ── */
    .search-row { flex-wrap: wrap; margin-bottom: var(--space-8); }
    .search-field { position: relative; flex: 1; min-width: 200px; }
    .search-field .input {
      max-width: none; width: 100%;
      height: 48px; padding-left: 44px;
      border-radius: var(--radius-xl);
      background: var(--color-surface);
      font-size: var(--text-md);
    }
    .search-field .input:focus {
      background: var(--color-bg);
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-ring);
    }
    .search-field__icon {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-tertiary); pointer-events: none;
    }

    /* ── Masonry gallery (Pinterest layout) ── */
    .masonry { column-gap: var(--space-5); columns: 4 250px; }
    @media (max-width: 900px) { .masonry { columns: 3 220px; } }
    @media (max-width: 560px) { .masonry { columns: 2 160px; } }

    .artifact-card {
      position: relative; display: block;
      break-inside: avoid; margin-bottom: var(--space-5);
      border-radius: var(--radius-xl); overflow: hidden;
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition-normal),
                  box-shadow var(--transition-normal),
                  border-color var(--transition-normal);
    }
    .artifact-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: #d0d0d0;
    }
    .artifact-card__thumb {
      position: relative; width: 100%; overflow: hidden;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border-subtle);
    }
    .artifact-card__frame {
      position: absolute; top: 0; left: 0;
      width: 400%; height: 400%;
      transform: scale(0.25); transform-origin: top left;
      border: 0; pointer-events: none; background: #fff;
    }
    /* neutral placeholder shown until the live preview iframe paints */
    .artifact-card__ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--color-surface);
      color: var(--color-text-tertiary);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: 0.02em;
      padding: 0 var(--space-3); text-align: center;
    }

    /* permanent info bar under the thumbnail */
    .artifact-card__info { padding: var(--space-3) var(--space-4) var(--space-4); }
    .artifact-card__row {
      display: flex; align-items: center; gap: var(--space-2);
    }
    .artifact-card__dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-success); flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    }
    .artifact-card__name {
      flex: 1; min-width: 0;
      font-size: var(--text-base); font-weight: var(--weight-semibold);
      letter-spacing: -0.01em; color: var(--color-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .artifact-card__author {
      font-size: var(--text-xs); color: var(--color-text-tertiary);
      margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* clickable surface — keeps the card an <a>-free container so the download
       button can live as a valid sibling rather than nested inside a link */
    .artifact-card__link { display: block; color: inherit; text-decoration: none; }

    /* floating "download to fork" button, top-right of each card */
    .artifact-card__download {
      position: absolute; top: var(--space-3); right: var(--space-3); z-index: 2;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(4px);
      opacity: 0; transform: translateY(-4px);
      transition: opacity var(--transition-fast), transform var(--transition-fast),
                  color var(--transition-fast), border-color var(--transition-fast);
    }
    .artifact-card:hover .artifact-card__download { opacity: 1; transform: translateY(0); }
    .artifact-card__download:hover { color: var(--brand); border-color: var(--brand); }
    .artifact-card__download:focus-visible { opacity: 1; transform: translateY(0); outline: 2px solid var(--brand); outline-offset: 2px; }
    @media (hover: none) {
      .artifact-card__download { opacity: 1; transform: none; }
    }

    /* ── Confetti celebration ── */
    .celebrate {
      display: none; position: fixed; inset: 0; z-index: 200;
      align-items: center; justify-content: center;
      background: rgba(8,8,12,0.55); backdrop-filter: blur(3px);
      padding: var(--space-4);
    }
    .celebrate.active { display: flex; }
    .celebrate__canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .celebrate__card {
      position: relative; z-index: 1;
      background: var(--color-bg);
      border: 3px solid var(--color-text);
      border-radius: var(--radius-xl);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      padding: var(--space-8) var(--space-8) var(--space-6);
      text-align: center; max-width: 440px; width: 100%;
      animation: pop 200ms ease;
    }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .celebrate__emoji { font-size: 2.75rem; line-height: 1; }
    .celebrate__title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: var(--text-2xl); font-weight: var(--weight-semibold);
      margin-top: var(--space-3);
    }
    .celebrate__link {
      display: inline-block; margin-top: var(--space-4);
      font-family: var(--font-mono); font-size: var(--text-sm);
      color: var(--brand); text-decoration: underline; word-break: break-all;
    }
    .celebrate__meta { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: var(--space-2); }
    .celebrate__actions { display: flex; gap: var(--space-3); justify-content: center; margin-top: var(--space-6); }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .nav { padding-inline: var(--space-4); }
      .container { padding-inline: var(--space-4); }
      .page-header {
        padding-block: var(--space-6) var(--space-4);
        flex-direction: column; align-items: stretch; gap: var(--space-3);
      }
      .page-header__title { font-size: 2rem; }
      .page-header .btn { width: 100%; justify-content: center; padding-block: var(--space-3); }
      .search-row { margin-bottom: var(--space-5); }
      .celebrate__card { padding: var(--space-6) var(--space-5) var(--space-5); }
      .celebrate__actions { flex-direction: column; }
      .celebrate__actions .btn { width: 100%; justify-content: center; }
    }
    @media (hover: none) {
      .artifact-card:hover { transform: none; }
    }

    /* ── Full-page drop overlay ── */
    #drop-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(2px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: var(--space-3);
    }
    #drop-overlay.active { display: flex; }
    .drop-overlay__box {
      background: var(--color-bg);
      border: 2px dashed var(--color-text-tertiary);
      border-radius: var(--radius-xl);
      padding: var(--space-12) var(--space-16);
      text-align: center;
      pointer-events: none;
    }
    .drop-overlay__icon { font-size: 2.5rem; margin-bottom: var(--space-3); }
    .drop-overlay__title { font-size: var(--text-xl); font-weight: var(--weight-semibold); }
    .drop-overlay__sub { font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: var(--space-1); }

    /* ── Modal (dialog) ── */
    dialog {
      margin: auto;
      border: none; padding: 0; border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      max-width: 440px; width: calc(100vw - 2rem);
      background: var(--color-bg);
    }
    dialog::backdrop { background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); }

    .modal__header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-5) var(--space-5) 0;
    }
    .modal__title { font-size: var(--text-lg); font-weight: var(--weight-semibold); letter-spacing: -0.02em; }
    .modal__close {
      background: none; border: none; cursor: pointer;
      color: var(--color-text-tertiary); font-size: 1.25rem; line-height: 1;
      padding: var(--space-1); border-radius: var(--radius-sm);
      transition: color var(--transition-fast);
    }
    .modal__close:hover { color: var(--color-text); }
    .modal__body { padding: var(--space-5); }
    .modal__footer {
      padding: 0 var(--space-5) var(--space-5);
      display: flex; gap: var(--space-3); justify-content: flex-end;
    }

    /* ── Drop zone inside modal ── */
    #modal-dropzone {
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-8) var(--space-6);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      margin-bottom: var(--space-4);
    }
    #modal-dropzone:hover, #modal-dropzone.dragover {
      border-color: var(--color-text-tertiary);
      background: var(--color-surface);
    }
    #modal-dropzone { margin-bottom: 0; }
    #modal-dropzone input[type=file] { display: none; }
    .dropzone__icon { font-size: 1.75rem; margin-bottom: var(--space-2); }
    .dropzone__label { font-size: var(--text-md); color: var(--color-text-secondary); }
    .dropzone__label strong { color: var(--color-text); }
    .dropzone__hint { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: var(--space-1); }

    /* "or" divider between the file drop zone and the folder button */
    .dropzone__divider {
      display: flex; align-items: center; gap: var(--space-3);
      margin: var(--space-4) 0;
      color: var(--color-text-tertiary); font-size: var(--text-xs);
    }
    .dropzone__divider::before, .dropzone__divider::after {
      content: ""; flex: 1; height: 1px; background: var(--color-border);
    }

    /* Prominent, full-width "upload a folder" button */
    .dropzone__folder {
      width: 100%; justify-content: center;
      padding-block: var(--space-3);
      font-weight: var(--weight-medium);
      margin-bottom: var(--space-4);
    }

    /* ── File summary ── */
    #file-summary {
      display: none;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
      font-size: var(--text-sm);
      display: flex; align-items: center; gap: var(--space-3);
    }
    #file-summary.hidden { display: none; }
    .file-summary__icon { font-size: 1.25rem; flex-shrink: 0; }
    .file-summary__info { flex: 1; }
    .file-summary__name { font-weight: var(--weight-medium); }
    .file-summary__meta { color: var(--color-text-secondary); font-size: var(--text-xs); }
    .file-summary__clear { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 1rem; padding: var(--space-1); }
    .file-summary__clear:hover { color: var(--color-text); }

    /* ── Form field ── */
    .field { margin-bottom: var(--space-4); }
    .field label { display: block; font-size: var(--text-sm); font-weight: var(--weight-medium); margin-bottom: var(--space-2); }
    .field .hint { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: var(--space-1); }
    .field .hint--warn { color: var(--color-warning-text); font-weight: var(--weight-medium); }

    /* ── Progress bar ── */
    #progress-wrap { display: none; margin-bottom: var(--space-4); }
    #progress-wrap.visible { display: block; }
    .progress-label { font-size: var(--text-xs); color: var(--color-text-secondary); margin-bottom: var(--space-2); display: flex; justify-content: space-between; }
    .progress-track {
      height: 4px; background: var(--color-border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--brand); border-radius: 2px;
      width: 0%; transition: width 0.1s linear;
    }

    /* ── Error / warning banner ── */
    .banner {
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
    }
    .banner--error { background: var(--color-error-bg); color: var(--color-error-text); }
    .banner--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .banner--success { background: var(--color-success-bg); color: var(--color-success-text); }
    .banner.hidden { display: none; }

    /* ── Conflict confirm ── */
    #conflict-section { display: none; }
    #conflict-section.visible { display: block; }
  </style>
</head>
<body>

  <!-- Full-page drag-over overlay -->
  <div id="drop-overlay" role="status" aria-live="polite">
    <div class="drop-overlay__box">
      <div class="drop-overlay__icon">⬆</div>
      <div class="drop-overlay__title">Drop to deploy</div>
      <div class="drop-overlay__sub">Release your folder or zip file to start</div>
    </div>
  </div>

  <!-- New Site modal -->
  <dialog id="deploy-modal" aria-labelledby="modal-title">
    <div class="modal__header">
      <span class="modal__title" id="modal-title">New artifact</span>
      <button class="modal__close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal__body">

      <!-- Drop zone (file inputs are siblings, not children, so a programmatic
           .click() can't bubble back into the dropzone and re-open the picker) -->
      <input type="file" id="file-input" multiple style="display:none">
      <input type="file" id="folder-input" webkitdirectory directory style="display:none">
      <div id="modal-dropzone" role="button" tabindex="0" aria-label="Choose files to deploy">
        <div class="dropzone__icon">📄</div>
        <div class="dropzone__label"><strong>Click to choose files</strong></div>
        <div class="dropzone__hint">a single .html, several files, or a .zip — or drag them here</div>
      </div>
      <div class="dropzone__divider"><span>or</span></div>
      <button type="button" id="choose-folder" class="btn btn--secondary dropzone__folder">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M1.5 4.5c0-.55.45-1 1-1h3l1.5 1.5h5.5c.55 0 1 .45 1 1v6c0 .55-.45 1-1 1h-11c-.55 0-1-.45-1-1v-6.5z"
                stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
        Upload a whole folder
      </button>

      <!-- File summary -->
      <div id="file-summary" class="hidden">
        <span class="file-summary__icon">📄</span>
        <div class="file-summary__info">
          <div class="file-summary__name" id="fs-name"></div>
          <div class="file-summary__meta" id="fs-meta"></div>
        </div>
        <button class="file-summary__clear" id="fs-clear" aria-label="Clear files">✕</button>
      </div>

      <!-- Conflict warning -->
      <div id="conflict-section">
        <div class="banner banner--warning" id="conflict-banner"></div>
        <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);margin-bottom:var(--space-4);cursor:pointer;">
          <input type="checkbox" id="overwrite-check">
          Yes, overwrite this site
        </label>
      </div>

      <!-- Error/success -->
      <div class="banner banner--error hidden" id="error-banner"></div>
      <div class="banner banner--success hidden" id="success-banner"></div>

      <!-- Progress -->
      <div id="progress-wrap">
        <div class="progress-label">
          <span id="progress-label">Uploading…</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <!-- Site name -->
      <div class="field">
        <label for="site-name-input">Site name</label>
        <input class="input" type="text" id="site-name-input"
               placeholder="my-site"
               pattern="[a-z0-9][a-z0-9\-]*[a-z0-9]|[a-z0-9]"
               autocomplete="off" spellcheck="false">
        <div class="hint" id="site-name-hint"></div>
      </div>

    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn--primary" id="deploy-btn" disabled>Deploy</button>
    </div>
  </dialog>

  <div class="container">
    <div class="page-header">
      <h1 class="page-header__title">
        Artifacts
        <span class="site-count" id="site-count"></span>
      </h1>
      <button class="btn btn--primary" id="new-site">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
        New artifact
      </button>
    </div>

    <div class="search-row">
      <div class="search-field">
        <svg class="search-field__icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input class="input" type="search" id="search" placeholder="Search artifacts…" autocomplete="off">
      </div>
    </div>

    <div class="masonry" id="sites"></div>
  </div>

  <!-- Deploy success celebration -->
  <div id="celebrate" class="celebrate" aria-hidden="true">
    <canvas id="confetti-canvas" class="celebrate__canvas"></canvas>
    <div class="celebrate__card" role="dialog" aria-label="Site deployed">
      <div class="celebrate__emoji">🎉</div>
      <div class="celebrate__title">Your site is live!</div>
      <a class="celebrate__link" id="celebrate-link" href="#" target="_blank" rel="noopener">👉 …</a>
      <div class="celebrate__meta" id="celebrate-meta"></div>
      <div class="celebrate__actions">
        <button class="btn btn--secondary" id="celebrate-close">Done</button>
        <button class="btn btn--secondary" id="celebrate-copy">Copy link</button>
        <a class="btn btn--primary" id="celebrate-open" href="#" target="_blank" rel="noopener">Open site →</a>
      </div>
    </div>
  </div>

  <script>
    /* ── Site list ─────────────────────────────────────────────── */
    var allSites = [];

    artifact.ready().then(function () {
      loadSites();
    });

    document.getElementById('search').addEventListener('input', function (e) {
      var q = e.target.value.toLowerCase();
      renderSites(allSites.filter(function (s) { return s.name.includes(q); }));
    });

    // Deterministic hash from a name → stable per-card thumbnail height
    function hashHue(name) {
      var h = 0;
      for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return h;
    }
    // Varied thumbnail heights give the Pinterest masonry rhythm
    var THUMB_HEIGHTS = [180, 220, 260, 300, 240];
    function thumbHeight(name) {
      return THUMB_HEIGHTS[hashHue(name) % THUMB_HEIGHTS.length];
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function loadSites() {
      fetch('/api/v1/sites', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (sites) { allSites = sites; renderSites(sites); });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function renderSites(sites) {
      var countEl = document.getElementById('site-count');
      countEl.textContent = sites.length ? sites.length + ' deployed' : '';
      var el = document.getElementById('sites');
      if (!sites.length) {
        el.innerHTML = '<div class="empty-state">'
          + '<div class="empty-state__icon">■</div>'
          + '<div class="empty-state__title">No artifacts yet</div>'
          + '<div class="empty-state__body">Click <strong>New artifact</strong> above, or drop a folder anywhere on the page.</div>'
          + '<code class="empty-state__code">artifact init &amp;&amp; artifact deploy</code>'
          + '</div>';
        return;
      }
      el.innerHTML = sites.map(function (s) {
        var domain = s.name + '.' + location.hostname + (location.port ? ':' + location.port : '');
        var h = thumbHeight(s.name);
        var dl = '/api/v1/sites/' + encodeURIComponent(s.name) + '/download';
        return '<div class="artifact-card">'
          + '<a class="artifact-card__link" href="//' + esc(domain) + '">'
          +   '<div class="artifact-card__thumb" style="height:' + h + 'px">'
          +     '<div class="artifact-card__ph">' + esc(s.name) + '</div>'
          +     '<iframe class="artifact-card__frame" src="//' + esc(domain) + '" loading="lazy" scrolling="no"'
          +       ' tabindex="-1" aria-hidden="true" sandbox="allow-scripts allow-same-origin"></iframe>'
          +   '</div>'
          +   '<div class="artifact-card__info">'
          +     '<div class="artifact-card__row">'
          +       '<span class="artifact-card__dot" aria-hidden="true"></span>'
          +       '<span class="artifact-card__name">' + esc(s.name) + '</span>'
          +     '</div>'
          +     (s.deployed_by ? '<div class="artifact-card__author">' + esc(s.deployed_by) + '</div>' : '')
          +   '</div>'
          + '</a>'
          + '<a class="artifact-card__download" href="' + esc(dl) + '" download'
          +   ' title="Download source to fork" aria-label="Download ' + esc(s.name) + ' source to fork">'
          +   '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">'
          +     '<path d="M8 1.75v8m0 0L5 6.75m3 3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
          +     '<path d="M2.5 11v1.75a1 1 0 001 1h9a1 1 0 001-1V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'
          +   '</svg>'
          + '</a>'
          + '</div>';
      }).join('');
    }

    /* ── Drop-to-Deploy ────────────────────────────────────────── */

    // State
    var pendingFiles = null;   // FileList from directory picker
    var pendingZip   = null;   // File (zip)
    var pendingName  = '';     // suggested site name

    // Elements
    var overlay        = document.getElementById('drop-overlay');
    var modal          = document.getElementById('deploy-modal');
    var newSiteBtn     = document.getElementById('new-site');
    var modalClose     = document.getElementById('modal-close');
    var modalCancel    = document.getElementById('modal-cancel');
    var deployBtn      = document.getElementById('deploy-btn');
    var dropzone       = document.getElementById('modal-dropzone');
    var fileInput      = document.getElementById('file-input');
    var folderInput    = document.getElementById('folder-input');
    var chooseFolder   = document.getElementById('choose-folder');
    var fileSummary    = document.getElementById('file-summary');
    var fsName         = document.getElementById('fs-name');
    var fsMeta         = document.getElementById('fs-meta');
    var fsClear        = document.getElementById('fs-clear');
    var siteNameInput  = document.getElementById('site-name-input');
    var siteNameHint   = document.getElementById('site-name-hint');
    var conflictSec    = document.getElementById('conflict-section');
    var conflictBanner = document.getElementById('conflict-banner');
    var overwriteCheck = document.getElementById('overwrite-check');
    var errorBanner    = document.getElementById('error-banner');
    var successBanner  = document.getElementById('success-banner');
    var progressWrap   = document.getElementById('progress-wrap');
    var progressFill   = document.getElementById('progress-fill');
    var progressPct    = document.getElementById('progress-pct');
    var progressLabel  = document.getElementById('progress-label');

    // Only react to drags that carry actual files — ignore links, text, or
    // images dragged in from other websites/tabs.
    function dragHasFiles(e) {
      var dt = e.dataTransfer;
      if (!dt || !dt.types) return false;
      return Array.prototype.indexOf.call(dt.types, 'Files') !== -1;
    }

    // ── Page-level drag handling (shows full-page overlay) ──────
    var dragDepth = 0;
    document.addEventListener('dragenter', function (e) {
      if (!dragHasFiles(e)) return;
      e.preventDefault();
      dragDepth++;
      if (dragDepth === 1) overlay.classList.add('active');
    });
    document.addEventListener('dragleave', function (e) {
      if (dragDepth === 0) return;
      dragDepth--;
      if (dragDepth === 0) overlay.classList.remove('active');
    });
    document.addEventListener('dragover', function (e) {
      if (dragHasFiles(e)) e.preventDefault();
    });
    document.addEventListener('drop', function (e) {
      if (!dragHasFiles(e)) return;
      e.preventDefault();
      dragDepth = 0;
      overlay.classList.remove('active');
      handleDroppedItems(e.dataTransfer);
    });

    function handleDroppedItems(dt) {
      var files = dt.files;
      if (!files || files.length === 0) return;  // nothing droppable — don't open the modal
      // Prefer zip if dropped
      if (files.length === 1 && files[0].name.endsWith('.zip')) {
        setZip(files[0]);
      } else if (files.length > 0) {
        // Multi-file drop (browser flattens directories to file list)
        setFiles(files, guessFolderName(dt));
      }
      openModal();
    }

    function guessFolderName(dt) {
      // Chrome exposes items[0].webkitGetAsEntry() to get the folder name
      if (dt.items && dt.items[0]) {
        var entry = dt.items[0].webkitGetAsEntry && dt.items[0].webkitGetAsEntry();
        if (entry && entry.isDirectory) return entry.name;
      }
      return '';
    }

    // ── Modal open / close ──────────────────────────────────────
    newSiteBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modal.addEventListener('cancel', closeModal);  // Esc key

    function openModal() {
      resetModal();
      modal.showModal();
      siteNameInput.focus();
    }

    function closeModal() {
      modal.close();
      resetModal();
    }

    function resetModal() {
      pendingFiles = null; pendingZip = null; pendingName = '';
      fileSummary.classList.add('hidden');
      dropzone.style.display = '';
      siteNameInput.value = '';
      siteNameHint.textContent = '';
      hide(conflictSec); hide(errorBanner); hide(successBanner);
      hide(progressWrap);
      overwriteCheck.checked = false;
      deployBtn.disabled = true;
      deployBtn.textContent = 'Deploy';
    }

    // ── Modal drop zone ─────────────────────────────────────────
    dropzone.addEventListener('dragover', function (e) {
      e.preventDefault(); dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', function () {
      dropzone.classList.remove('dragover');
    });
    dropzone.addEventListener('drop', function (e) {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.remove('dragover');
      handleDroppedItems(e.dataTransfer);
    });
    dropzone.addEventListener('click', function () {
      fileInput.click();
    });
    dropzone.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });
    chooseFolder.addEventListener('click', function (e) {
      e.stopPropagation();  // don't also trigger the dropzone's files picker
      folderInput.click();
    });

    // Plain picker: a single .html, several files, or a single .zip.
    fileInput.addEventListener('change', function () {
      if (!fileInput.files.length) return;
      var files = fileInput.files;
      if (files.length === 1 && files[0].name.toLowerCase().endsWith('.zip')) {
        setZip(files[0]);
        return;
      }
      var name = guessNameFromWebkitPath(files);
      if (!name && files.length === 1) name = files[0].name.replace(/\.[^.]+$/, '');
      setFiles(files, name);
    });

    // Folder picker: whole directory tree (webkitRelativePath preserved).
    folderInput.addEventListener('change', function () {
      if (folderInput.files.length) setFiles(folderInput.files, guessNameFromWebkitPath(folderInput.files));
    });

    function guessNameFromWebkitPath(files) {
      // webkitRelativePath = "foldername/index.html"
      if (files[0] && files[0].webkitRelativePath) {
        return files[0].webkitRelativePath.split('/')[0];
      }
      return '';
    }

    function setFiles(files, folderName) {
      pendingFiles = files; pendingZip = null;
      pendingName = slugify(folderName || '');
      showFileSummary(
        folderName || (files.length + ' files'),
        files.length + ' file' + (files.length !== 1 ? 's' : '') + ' · ' + formatSize(totalSize(files))
      );
      if (pendingName && !siteNameInput.value) siteNameInput.value = pendingName;
      validateForm();
    }

    function setZip(file) {
      pendingZip = file; pendingFiles = null;
      pendingName = slugify(file.name.replace(/\.zip$/i, ''));
      showFileSummary(file.name, formatSize(file.size) + ' zip archive');
      if (pendingName && !siteNameInput.value) siteNameInput.value = pendingName;
      validateForm();
    }

    function showFileSummary(name, meta) {
      dropzone.style.display = 'none';
      fileSummary.classList.remove('hidden');
      fsName.textContent = name;
      fsMeta.textContent = meta;
    }

    fsClear.addEventListener('click', function () {
      pendingFiles = null; pendingZip = null;
      fileSummary.classList.add('hidden');
      dropzone.style.display = '';
      fileInput.value = '';
      folderInput.value = '';
      validateForm();
    });

    function totalSize(files) {
      var n = 0;
      for (var i = 0; i < files.length; i++) n += files[i].size;
      return n;
    }

    // ── Site name validation ────────────────────────────────────
    siteNameInput.addEventListener('input', function () {
      hide(conflictSec); overwriteCheck.checked = false;
      validateForm();
    });

    function nameExists(name) {
      return allSites.some(function (s) { return s.name === name; });
    }

    function validateForm() {
      var name = siteNameInput.value.trim();
      var hasFiles = pendingFiles || pendingZip;
      var nameOk = /^[a-z0-9][a-z0-9\-]*[a-z0-9]$|^[a-z0-9]$/.test(name);
      siteNameHint.classList.remove('hint--warn');
      if (name && !nameOk) {
        siteNameHint.textContent = 'Lowercase letters, numbers, and hyphens only; must start and end with a letter or number.';
      } else if (hasFiles && nameOk && nameExists(name)) {
        siteNameHint.textContent = '“' + name + '” already exists — deploying will replace it.';
        siteNameHint.classList.add('hint--warn');
        deployBtn.textContent = 'Overwrite & deploy';
      } else {
        siteNameHint.textContent = hasFiles && nameOk
          ? name + '.' + location.hostname + (location.port ? ':' + location.port : '')
          : '';
        if (!conflictSec.classList.contains('visible')) deployBtn.textContent = 'Deploy';
      }
      deployBtn.disabled = !(hasFiles && nameOk);
    }

    // ── Deploy ──────────────────────────────────────────────────
    deployBtn.addEventListener('click', function () {
      var name = siteNameInput.value.trim();
      var confirmOverwrite =
        (conflictSec.classList.contains('visible') && overwriteCheck.checked) ||
        nameExists(name);
      startDeploy(confirmOverwrite);
    });

    overwriteCheck.addEventListener('change', function () {
      deployBtn.disabled = !overwriteCheck.checked;
    });

    function startDeploy(confirmOverwrite) {
      hide(errorBanner); hide(successBanner); hide(conflictSec);
      deployBtn.disabled = true;
      deployBtn.textContent = 'Deploying…';
      show(progressWrap);
      setProgress(0, 'Uploading…');

      var form = new FormData();
      form.append('site', siteNameInput.value.trim());
      if (confirmOverwrite) form.append('confirm_overwrite', 'true');

      if (pendingZip) {
        form.append('zip', pendingZip, pendingZip.name);
      } else {
        for (var i = 0; i < pendingFiles.length; i++) {
          var f = pendingFiles[i];
          // Use webkitRelativePath as the filename so the server sees folder structure
          var name = f.webkitRelativePath || f.name;
          form.append('files', f, name);
        }
      }

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/v1/deploy');
      xhr.withCredentials = true;

      xhr.upload.addEventListener('progress', function (e) {
        if (e.lengthComputable) {
          var pct = Math.round(e.loaded / e.total * 90); // leave 10% for server processing
          setProgress(pct, 'Uploading…');
        }
      });

      xhr.addEventListener('load', function () {
        setProgress(100, 'Done');
        hide(progressWrap);

        var body;
        try { body = JSON.parse(xhr.responseText); } catch (e) { body = {}; }

        if (xhr.status === 200) {
          onDeploySuccess(body);
        } else if (xhr.status === 409) {
          onDeployConflict(body);
        } else {
          onDeployError(body.error || ('Unexpected error (' + xhr.status + ')'));
        }
      });

      xhr.addEventListener('error', function () {
        hide(progressWrap);
        onDeployError('Network error — could not reach the server.');
      });

      xhr.send(form);
    }

    function onDeploySuccess(data) {
      var url = data.url || ('//' + data.site + '.' + location.hostname + (location.port ? ':' + location.port : ''));
      deployBtn.textContent = 'Deploy';
      deployBtn.disabled = false;
      closeModal();
      celebrate(data, url);
      loadSites(); // refresh the gallery in background
    }

    function onDeployConflict(data) {
      show(conflictSec);
      conflictBanner.textContent = data.error
        + (data.last_deployed_by ? ' Last deployed by: ' + data.last_deployed_by + '.' : '');
      overwriteCheck.checked = false;
      deployBtn.disabled = true;
      deployBtn.textContent = 'Deploy';
    }

    function onDeployError(msg) {
      show(errorBanner);
      errorBanner.textContent = msg;
      deployBtn.textContent = 'Deploy';
      deployBtn.disabled = false;
    }

    function setProgress(pct, label) {
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
      progressLabel.textContent = label;
    }

    // ── Deploy celebration + confetti ───────────────────────────
    var celebrateEl    = document.getElementById('celebrate');
    var celebrateLink  = document.getElementById('celebrate-link');
    var celebrateMeta  = document.getElementById('celebrate-meta');
    var celebrateOpen  = document.getElementById('celebrate-open');
    var celebrateClose = document.getElementById('celebrate-close');
    var celebrateCopy  = document.getElementById('celebrate-copy');
    var celebrateURL   = '';
    var confettiCanvas = document.getElementById('confetti-canvas');

    function celebrate(data, url) {
      var pretty = url.replace(/^\/\//, '');
      celebrateURL = /^https?:/.test(url) ? url : location.protocol + url;
      celebrateLink.textContent = '👉 ' + pretty + ' 👈';
      celebrateLink.href = url;
      celebrateOpen.href = url;
      celebrateCopy.textContent = 'Copy link';
      var bits = [];
      if (data.file_count != null) bits.push(data.file_count + ' file' + (data.file_count !== 1 ? 's' : ''));
      if (data.total_bytes != null) bits.push(formatSize(data.total_bytes));
      celebrateMeta.textContent = bits.join(' · ');
      celebrateEl.classList.add('active');
      celebrateEl.setAttribute('aria-hidden', 'false');
      launchConfetti();
    }
    function dismissCelebrate() {
      celebrateEl.classList.remove('active');
      celebrateEl.setAttribute('aria-hidden', 'true');
    }
    celebrateClose.addEventListener('click', dismissCelebrate);
    celebrateCopy.addEventListener('click', function () {
      copyToClipboard(celebrateURL);
      celebrateCopy.textContent = '✓ Copied!';
      setTimeout(function () { celebrateCopy.textContent = 'Copy link'; }, 1800);
    });
    celebrateEl.addEventListener('click', function (e) { if (e.target === celebrateEl) dismissCelebrate(); });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && celebrateEl.classList.contains('active')) dismissCelebrate();
    });

    // Self-contained canvas confetti — no external dependency
    function launchConfetti() {
      var ctx = confettiCanvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var W = window.innerWidth, H = window.innerHeight;
      confettiCanvas.width = W * dpr; confettiCanvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      var colors = ['#6d5efc', '#a855f7', '#f43f5e', '#f59e0b', '#10b981', '#3b82f6', '#ec4899'];
      var parts = [];
      for (var i = 0; i < 180; i++) {
        parts.push({
          x: W / 2 + (Math.random() - 0.5) * W * 0.3,
          y: H * 0.35 + (Math.random() - 0.5) * 60,
          r: 4 + Math.random() * 6,
          c: colors[i % colors.length],
          vx: (Math.random() - 0.5) * 14,
          vy: -8 - Math.random() * 10,
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.4
        });
      }
      var start = performance.now();
      (function frame(t) {
        var elapsed = t - start;
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i];
          p.vy += 0.32;        // gravity
          p.vx *= 0.99;
          p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          ctx.save();
          ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.globalAlpha = Math.max(0, 1 - elapsed / 3500);
          ctx.fillStyle = p.c;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();
        }
        if (elapsed < 3500) requestAnimationFrame(frame);
        else ctx.clearRect(0, 0, W, H);
      })(start);
    }

    // ── Helpers ─────────────────────────────────────────────────
    function show(el) { el.classList.remove('hidden'); el.classList.add('visible'); el.style.display = ''; }
    function hide(el) { el.classList.add('hidden'); el.classList.remove('visible'); }

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function () { fallbackCopy(text); });
      } else {
        fallbackCopy(text);
      }
    }
    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }

    function slugify(str) {
      return str.toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 63);
    }
  </script>
</body>
</html>
