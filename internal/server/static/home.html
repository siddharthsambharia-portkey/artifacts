<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artifact</title>
  <link rel="stylesheet" href="/ui.css">
  <script src="/artifact.js"></script>
  <style>
    body { background: var(--color-surface); }

    .site-count {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      font-weight: var(--weight-normal);
    }

    /* Site card favicon placeholder */
    .card__favicon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      margin-bottom: var(--space-3);
      font-weight: var(--weight-semibold);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .card__domain {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      margin-top: var(--space-2);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav__logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
      </svg>
      Artifact
    </span>
    <div class="nav__spacer"></div>
    <span class="nav__user" id="user-name"></span>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-header__title">
          Internal Sites
          <span class="site-count" id="site-count"></span>
        </h1>
        <p class="page-header__sub">Your company's internal web platform</p>
      </div>
      <!-- #new-site is hidden here; plan 010 (Drop-to-Deploy) unhides it -->
      <button class="btn btn--primary" id="new-site" style="display:none" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
        New Site
      </button>
    </div>

    <div class="search-row">
      <input class="input" type="search" id="search" placeholder="Search sites…" autocomplete="off">
    </div>

    <div class="grid grid--auto" id="sites"></div>
  </div>

  <script>
    let allSites = [];

    artifact.ready().then(async () => {
      const name = artifact.me.name || artifact.me.email || '';
      document.getElementById('user-name').textContent = name;

      const res = await fetch('/api/v1/sites', { credentials: 'same-origin' });
      allSites = await res.json();
      render(allSites);
    });

    document.getElementById('search').addEventListener('input', function (e) {
      const q = e.target.value.toLowerCase();
      render(allSites.filter(function (s) { return s.name.includes(q); }));
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function timeAgo(iso) {
      var d = new Date(iso);
      var diff = Math.floor((Date.now() - d) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString();
    }

    function render(sites) {
      var countEl = document.getElementById('site-count');
      countEl.textContent = sites.length ? '(' + sites.length + ')' : '';

      var el = document.getElementById('sites');
      if (!sites.length) {
        el.innerHTML = '<div class="empty-state" style="grid-column: 1/-1">'
          + '<div class="empty-state__icon">■</div>'
          + '<div class="empty-state__title">No sites yet</div>'
          + '<div class="empty-state__body">Deploy your first internal site to see it here.</div>'
          + '<code class="empty-state__code">artifact init &amp;&amp; artifact deploy</code>'
          + '</div>';
        return;
      }

      el.innerHTML = sites.map(function (s) {
        var domain = s.name + '.' + location.hostname + (location.port ? ':' + location.port : '');
        var initial = s.name.charAt(0).toUpperCase();
        return '<a class="card card--interactive" href="//' + domain + '">'
          + '<div class="card__favicon">' + initial + '</div>'
          + '<div class="card__title">' + s.name + '</div>'
          + '<div class="card__meta">' + (s.deployed_by || '—') + ' · ' + timeAgo(s.deployed_at) + ' · ' + formatSize(s.size_bytes) + '</div>'
          + '<div class="card__domain">' + domain + '</div>'
          + '</a>';
      }).join('');
    }
  </script>
</body>
</html>
