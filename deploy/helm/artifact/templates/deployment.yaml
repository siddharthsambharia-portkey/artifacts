apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-artifact
  labels:
    app: artifact
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: artifact
  template:
    metadata:
      labels:
        app: artifact
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-artifact" .Release.Name) }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      volumes:
        - name: artifact-config
          configMap:
            name: {{ .Release.Name }}-artifact-config
        {{- if and .Values.storageKeyFallback.enabled .Values.storageKeyFallback.secretName (eq .Values.config.storage.driver "gcs") }}
        - name: gcs-key
          secret:
            secretName: {{ .Values.storageKeyFallback.secretName }}
        {{- end }}
      containers:
        - name: artifact
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: artifact-config
              mountPath: /etc/artifact
              readOnly: true
            {{- if and .Values.storageKeyFallback.enabled .Values.storageKeyFallback.secretName (eq .Values.config.storage.driver "gcs") }}
            - name: gcs-key
              mountPath: /var/secrets/gcs
              readOnly: true
            {{- end }}
          env:
            - name: ARTIFACT_CONFIG
              value: /etc/artifact/artifact.yaml
            {{- if and .Values.storageKeyFallback.enabled .Values.storageKeyFallback.secretName (eq .Values.config.storage.driver "gcs") }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ printf "/var/secrets/gcs/%s" (.Values.storageKeyFallback.gcsKeyFileKey | default "key.json") | quote }}
            {{- end }}
            {{- if .Values.externalDatabase.enabled }}
            {{- if .Values.externalDatabase.secretName }}
            - name: ARTIFACT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.secretName }}
                  key: {{ .Values.externalDatabase.secretKey }}
            {{- else }}
            - name: ARTIFACT_DATABASE_URL
              value: {{ .Values.externalDatabase.url | quote }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.config.storage.driver "s3" }}
            {{- if and .Values.storageKeyFallback.enabled .Values.storageKeyFallback.secretName }}
            - name: ARTIFACT_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageKeyFallback.secretName }}
                  key: {{ .Values.storageKeyFallback.s3AccessKeyKey | default "access-key" }}
            - name: ARTIFACT_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageKeyFallback.secretName }}
                  key: {{ .Values.storageKeyFallback.s3SecretKeyKey | default "secret-key" }}
            {{- else if .Values.externalS3.enabled }}
            - name: ARTIFACT_S3_ACCESS_KEY
              value: {{ .Values.externalS3.accessKey | quote }}
            - name: ARTIFACT_S3_SECRET_KEY
              {{- if .Values.externalS3.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalS3.secretName }}
                  key: {{ .Values.externalS3.secretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-s3
                  key: secretKey
                  optional: true
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.config.auth.mode "header-trust" }}
            {{- if .Values.headerTrustSecret.secretName }}
            - name: {{ .Values.config.auth.headerTrust.proxySecretEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.headerTrustSecret.secretName }}
                  key: {{ .Values.headerTrustSecret.secretKey }}
            {{- end }}
            {{- end }}
            {{- if and (eq .Values.config.auth.mode "oidc") .Values.oidcSecret.secretName }}
            - name: {{ .Values.config.auth.oidc.clientSecretEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidcSecret.secretName }}
                  key: {{ .Values.oidcSecret.secretKey }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
        {{- if .Values.cloudSqlProxy.enabled }}
        - name: cloud-sql-proxy
          image: {{ .Values.cloudSqlProxy.image | quote }}
          args:
            - "--structured-logs"
            - {{ printf "--port=%d" (int64 .Values.cloudSqlProxy.port) | quote }}
            - {{ .Values.cloudSqlProxy.instanceConnectionName | quote }}
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
        {{- end }}
