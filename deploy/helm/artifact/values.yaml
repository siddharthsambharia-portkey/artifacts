replicaCount: 1

image:
  repository: ghcr.io/artifact/artifact
  tag: v0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: artifact.corp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  domain: artifact.corp.example.com
  auth:
    mode: oidc
  storage:
    driver: s3
    bucket: artifact-sites
    endpoint: minio.minio.svc:9000
  database:
    driver: postgres
  governance:
    mode: trust

externalDatabase:
  enabled: true
  url: postgres://artifact:secret@postgres:5432/artifact

externalS3:
  enabled: true
  accessKey: ""
  secretKey: ""

nats:
  enabled: false
  url: nats://nats:4222

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi
