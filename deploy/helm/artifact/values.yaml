replicaCount: 1

image:
  repository: ghcr.io/siddharthsambharia-portkey/artifacts
  tag: v0.1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8443

ingress:
  enabled: true
  className: nginx
  annotations: {}
  # For wildcard subdomain routing, add a *.domain entry here in addition to the apex host.
  # nginx-ingress supports wildcard host values natively.
  hosts:
    - host: artifact.corp.example.com
      paths:
        - path: /
          pathType: Prefix
  # TLS entries referencing the cert-manager-managed secret.
  # When certificate.enabled=true the secret name defaults to <release>-wildcard-tls;
  # set certificate.secretName and mirror it here.
  tls: []
  # Set to "nginx" or "traefik" to render batteries-included ingress glue
  # (middleware + wildcard routing) for header-trust mode.
  # Leave blank (default) to manage ingress annotations yourself.
  controller: ""

# Kubernetes ServiceAccount for the pod.
# Set annotations["iam.gke.io/gcp-service-account"] for Workload Identity on GKE;
# the pod then reads GCS via Application Default Credentials with no JSON key mounted.
serviceAccount:
  create: true
  # Override the name; defaults to <release>-artifact
  name: ""
  annotations: {}
  # Must be true on GKE for Workload Identity token projection to work
  automountServiceAccountToken: false

config:
  domain: artifact.corp.example.com
  auth:
    mode: oidc   # oidc | header-trust | dev
    oidc:
      issuer: ""
      clientId: ""
      # Name of the env var the binary reads for the OIDC client secret
      # (value is supplied via oidcSecret.secretName / secretKey below)
      clientSecretEnv: ARTIFACT_OIDC_SECRET
    headerTrust:
      emailHeader: X-Auth-Request-Email
      nameHeader: X-Auth-Request-Name
      groupsHeader: X-Auth-Request-Groups
      # Env var name the binary reads for the proxy shared secret
      # (value is supplied via headerTrustSecret.secretName / secretKey below)
      proxySecretEnv: ARTIFACT_PROXY_SECRET
  storage:
    driver: s3      # s3 | gcs | local
    bucket: artifact-sites
    endpoint: ""    # S3/MinIO only; leave blank for real AWS S3 or gcs
  database:
    driver: postgres
  governance:
    mode: trust

# External Postgres DSN.
# Production path (recommended): create a Kubernetes Secret holding the DSN and set
# secretName + secretKey. The deployment template injects the value as ARTIFACT_DATABASE_URL.
#   kubectl create secret generic artifact-db \
#     --from-literal=database-url="postgres://user:pass@host:5432/artifact?sslmode=require"
#
# Local dev / testing only: set url directly (plaintext — never use in production).
# url is intentionally empty; leaving it blank forces you to supply a real DSN or use secretName.
externalDatabase:
  enabled: true
  url: ""
  secretName: ""
  secretKey: database-url

# S3 / MinIO credentials — only used when config.storage.driver is "s3".
# secretKey value comes from a Kubernetes Secret (secretName / secretKey) when
# secretName is set; otherwise falls back to the legacy <release>-s3 secret.
externalS3:
  enabled: true
  accessKey: ""
  secretName: ""
  secretKey: secretKey

# First-class storage key fallback for operators who cannot create IAM bindings
# (Workload Identity on GKE or IRSA on EKS).
# When enabled, cloud-storage credentials are mounted from a Kubernetes Secret
# instead of relying on Workload Identity / IRSA.
#
# For GCS JSON key:
#   kubectl create secret generic artifact-gcs-key \
#     --from-file=key.json=/path/to/service-account-key.json
# For S3 / compatible access keys:
#   kubectl create secret generic artifact-s3-creds \
#     --from-literal=access-key=<key> --from-literal=secret-key=<secret>
#
# NOTE: enabling this suppresses the Workload Identity ServiceAccount annotation
# (iam.gke.io/gcp-service-account) so the two paths are mutually exclusive.
storageKeyFallback:
  enabled: false
  # Name of the pre-existing Kubernetes Secret holding the credential.
  secretName: ""
  # Key inside the Secret for GCS JSON key file (driver: gcs only).
  gcsKeyFileKey: "key.json"
  # Key inside the Secret for S3 access key (driver: s3 only).
  s3AccessKeyKey: "access-key"
  # Key inside the Secret for S3 secret key (driver: s3 only).
  s3SecretKeyKey: "secret-key"

# Kubernetes Secret that supplies the proxy shared secret for header-trust auth.
# The value is injected as the env var named in config.auth.headerTrust.proxySecretEnv.
# Create with: kubectl create secret generic <name> --from-literal=<key>=<secret>
headerTrustSecret:
  secretName: ""
  secretKey: proxy-secret

# Kubernetes Secret that supplies the OIDC client secret for native OIDC.
# The value is injected as the env var named in config.auth.oidc.clientSecretEnv.
# Create with: kubectl create secret generic <name> --from-literal=<key>=<secret>
oidcSecret:
  secretName: ""
  secretKey: client-secret

# cert-manager Certificate for *.<domain> + apex.
# DNS-01 is required for wildcard certs — HTTP-01 cannot issue *.
# Off by default; cert-manager CRDs are not assumed to be present.
# Enable with: --set certificate.enabled=true
# See deploy/recipes/wildcard-tls-gcp.md for the ClusterIssuer and full walkthrough.
certificate:
  enabled: false
  # Name of the cert-manager ClusterIssuer using a DNS-01 solver.
  # For the GCP profile use the Cloud DNS ClusterIssuer from the recipe.
  clusterIssuer: letsencrypt-dns01
  # Kubernetes Secret name cert-manager writes and the Ingress TLS block references.
  # Defaults to <release>-wildcard-tls when blank.
  secretName: ""

nats:
  enabled: false
  url: nats://nats:4222

# Cloud SQL Auth Proxy sidecar for GCP Cloud SQL connections via socket DSN.
# Off by default. Enable to add the sidecar alongside the Artifact container;
# it uses the pod's existing identity (Workload Identity or storageKeyFallback).
#
# Once enabled, point externalDatabase at the local socket:
#   externalDatabase.url: "postgres://artifact:<pw>@/artifact?host=/cloudsql/<connection>"
# Or use externalDatabase.secretName pointing to a Secret with the socket DSN.
cloudSqlProxy:
  enabled: false
  # Cloud SQL connection name: <project>:<region>:<instance>
  # Obtain with: terraform output -raw cloudsql_connection_name
  instanceConnectionName: ""
  # TCP port the proxy listens on (if using TCP instead of socket DSN)
  port: 5432
  # Cloud SQL Auth Proxy image (v2)
  image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2"

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi
