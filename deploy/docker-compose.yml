services:
  artifact:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8443:8443"
    environment:
      ARTIFACT_CONFIG: /etc/siddharthsambharia-portkey/artifacts.yaml
      ARTIFACT_DATABASE_URL: postgres://artifact:artifact@postgres:5432/artifact?sslmode=disable
      ARTIFACT_S3_ACCESS_KEY: minioadmin
      ARTIFACT_S3_SECRET_KEY: minioadmin
    volumes:
      - ./artifact.docker.yaml:/etc/siddharthsambharia-portkey/artifacts.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    command: ["serve", "--config", "/etc/siddharthsambharia-portkey/artifacts.yaml"]
    healthcheck:
      test: ["CMD", "/artifact", "version"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: artifact
      POSTGRES_PASSWORD: artifact
      POSTGRES_DB: artifact
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifact"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/artifact-sites;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
